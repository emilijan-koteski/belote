name: beljot

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beljot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beljot_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-beljot}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
