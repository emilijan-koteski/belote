name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: emilijan-koteski

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            context: ./server
            dockerfile: ./server/Dockerfile
          - name: web
            context: .
            dockerfile: ./client/Dockerfile
          - name: migrate
            context: ./server/migrations
            dockerfile: ./server/migrations/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/beljot-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/beljot-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + scripts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,scripts/backup-db.sh,scripts/restore-db.sh"
          target: "/opt/beljot/"
          overwrite: true
          strip_components: 0

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd /opt/beljot

            # Write secrets atomically: render full .env from the PROD_ENV_FILE secret
            umask 077
            cat > .env <<'ENVEOF'
            ${{ secrets.PROD_ENV_FILE }}
            ENVEOF
            chmod 600 .env

            # Pin this deploy to the commit SHA. Removes any existing IMAGE_TAG line first.
            sed -i '/^IMAGE_TAG=/d' .env
            echo "IMAGE_TAG=${GITHUB_SHA}" >> .env

            # Make scripts executable (SCP doesn't preserve +x reliably on Windows hosts).
            chmod +x scripts/*.sh

            # Authenticate to GHCR so private packages can be pulled.
            # If your GHCR packages are PUBLIC, you can remove this block.
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull

            # One-shot migrate. Aborts the deploy on non-zero exit — old api keeps serving.
            docker compose -f docker-compose.prod.yml run --rm migrate

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
            docker logout ghcr.io || true
