name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [master]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: belote
          POSTGRES_PASSWORD: belote_test_password
          POSTGRES_DB: belote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U belote"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BELOTE_DB_URL: postgres://belote:belote_test_password@localhost:5432/belote_test?sslmode=disable
      BELOTE_JWT_SECRET: test-secret
      BELOTE_PORT: 8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Install frontend dependencies
        run: cd client && npm ci

      - name: Run database migrations
        run: migrate -path server/migrations -database "$BELOTE_DB_URL" up

      - name: Lockfile — forbidden old team tokens
        run: bash scripts/lockfile-old-team-tokens.sh

      - name: Lint
        run: make lint

      - name: Test
        run: make test
