name: beljot

# IMAGE_TAG is set per-deploy by CI (commit SHA) or defaults to "latest".
# Override locally with: IMAGE_TAG=local docker compose -f docker-compose.prod.yml build

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  migrate:
    image: ghcr.io/emilijan-koteski/beljot-migrate:${IMAGE_TAG:-latest}
    build:
      context: ./server/migrations
    command: ["-database", "${BELJOT_DB_URL}", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  api:
    image: ghcr.io/emilijan-koteski/beljot-api:${IMAGE_TAG:-latest}
    build:
      context: ./server
    environment:
      BELJOT_DB_URL: ${BELJOT_DB_URL}
      BELJOT_JWT_SECRET: ${BELJOT_JWT_SECRET}
      BELJOT_PORT: ${BELJOT_PORT:-8080}
      BELJOT_CORS_ORIGINS: ${BELJOT_CORS_ORIGINS}
      BELJOT_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - web

  web:
    image: ghcr.io/emilijan-koteski/beljot-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - web

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
